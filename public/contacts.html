<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Contacts</div>
      <div class="page-sub" id="contacts-sub"></div>
    </div>
  </div>

  <div class="topbar-row">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search by name, email, company…">
    </div>
  </div>

  <div class="panel">
    <div id="contacts-list"><div class="empty-state">Loading…</div></div>
  </div>
</main>

<script src="admin.js"></script>
<script>
let contacts = [];
let searchTerm = '';
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(name) { return (name||'?').split(' ').map(p=>p[0]||'').slice(0,2).join('').toUpperCase(); }

async function loadContacts() {
  try {
    const data = await apiFetch('/api/enquiries?limit=500');
    const enqs = data.enquiries || [];
    // Deduplicate by email, keep latest
    const map = {};
    enqs.forEach(e => {
      const key = (e.email||'').toLowerCase();
      if (!map[key] || new Date(e.submitted_at) > new Date(map[key].submitted_at)) {
        map[key] = { ...e, enquiry_count: (map[key]?.enquiry_count||0) + 1 };
      } else {
        map[key].enquiry_count = (map[key].enquiry_count||1) + 1;
      }
    });
    contacts = Object.values(map).sort((a,b) => new Date(b.submitted_at) - new Date(a.submitted_at));
    document.getElementById('contacts-sub').textContent = contacts.length + ' unique contact' + (contacts.length===1?'':'s');
    renderContacts();
  } catch {
    document.getElementById('contacts-list').innerHTML = '<div class="empty-state">Failed to load</div>';
  }
}

function renderContacts() {
  let list = contacts;
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    list = list.filter(c =>
      (c.name||'').toLowerCase().includes(q) ||
      (c.email||'').toLowerCase().includes(q) ||
      (c.company||'').toLowerCase().includes(q)
    );
  }
  if (list.length === 0) {
    document.getElementById('contacts-list').innerHTML = '<div class="empty-state">No contacts found</div>';
    return;
  }
  document.getElementById('contacts-list').innerHTML = list.map(c => `
    <div class="contact-row" onclick="location.href='enquiry.html?id=${c.id}'">
      <div class="contact-avatar">${escHtml(initials(c.name))}</div>
      <div class="contact-info">
        <div class="contact-name">${escHtml(c.name)}${c.company?` <span style="color:var(--text-dim);font-size:0.78rem;font-weight:400">· ${escHtml(c.company)}</span>`:''}</div>
        <div class="contact-detail">${escHtml(c.email)} · Last: ${timeAgo(c.submitted_at)} · ${stageBadge(c.stage)}</div>
      </div>
      <div class="contact-actions">
        <a class="contact-btn" href="mailto:${escHtml(c.email)}?subject=Following up — Incremento" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Email
        </a>
        <button class="contact-btn" onclick="event.stopPropagation();location.href='enquiry.html?id=${c.id}'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          View
        </button>
      </div>
    </div>`).join('');
}

document.getElementById('search-input').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderContacts();
});

loadContacts();
</script>
</body>

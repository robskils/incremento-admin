<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Contacts</div>
      <div class="page-sub" id="contacts-sub"></div>
    </div>
  </div>

  <div class="topbar-row">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search by name, email, company…">
    </div>
  </div>

  <div class="panel">
    <div id="contacts-list"><div class="empty-state">Loading…</div></div>
  </div>
</main>

<!-- ── CONTACT CARD MODAL ──────────────────────────────────── -->
<div class="modal-overlay" id="contact-modal" style="display:none" onclick="if(event.target===this)closeContact()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">Contact</div>
      <button class="modal-close" onclick="closeContact()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="contact-card-body"></div>
  </div>
</div>

<script src="admin.js"></script>
<script>
let people = [];          // one record per person (by email)
let peopleByKey = {};
let searchTerm = '';
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function jsStr(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function initials(name) { return (name||'?').split(' ').map(p=>p[0]||'').slice(0,2).join('').toUpperCase(); }

async function loadContacts() {
  try {
    // A person = one email, built from BOTH the enquiries (deal owners) and the
    // contacts table (people added to deals, with role/phone). Merge the two.
    const [eRes, cRes] = await Promise.all([
      apiFetch('/api/enquiries?limit=500').catch(()=>({enquiries:[]})),
      apiFetch('/api/contacts').catch(()=>({contacts:[]})),
    ]);
    const enquiries = eRes.enquiries || [];
    const allContacts = cRes.contacts || [];
    const byId = {}; enquiries.forEach(e => { byId[e.id] = e; });

    const map = {};
    const ensure = (email, name) => {
      const k = (email||'').toLowerCase().trim();
      if (!k) return null;
      if (!map[k]) map[k] = { key:k, email:email, name:name||'', role:'', phone:'', company:'', deals:[], _ids:{}, last:null };
      return map[k];
    };
    const addDeal = (p, e) => {
      if (p._ids[e.id]) return;
      p._ids[e.id] = 1;
      p.deals.push({ id:e.id, title: e.project_title || e.company || (e.name + ' - enquiry'), stage:e.stage, company:e.company, submitted_at:e.submitted_at, value:e.value });
      if (!p.last || new Date(e.submitted_at) > new Date(p.last)) p.last = e.submitted_at;
    };

    enquiries.forEach(e => {
      const p = ensure(e.email, e.name); if (!p) return;
      if (!p.name) p.name = e.name;
      if (!p.company && e.company) p.company = e.company;
      addDeal(p, e);
    });
    allContacts.forEach(c => {
      const p = ensure(c.email, c.name); if (!p) return;
      if (c.name && !p.name) p.name = c.name;
      if (c.role && !p.role)  p.role = c.role;
      if (c.phone && !p.phone) p.phone = c.phone;
      const e = byId[c.enquiry_id];
      if (e) { if (!p.company && e.company) p.company = e.company; addDeal(p, e); }
    });

    people = Object.values(map).sort((a,b) => new Date(b.last||0) - new Date(a.last||0));
    peopleByKey = map;
    document.getElementById('contacts-sub').textContent = people.length + ' contact' + (people.length===1?'':'s');
    renderContacts();
  } catch {
    document.getElementById('contacts-list').innerHTML = '<div class="empty-state">Failed to load</div>';
  }
}

function renderContacts() {
  let list = people;
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    list = list.filter(p =>
      (p.name||'').toLowerCase().includes(q) ||
      (p.email||'').toLowerCase().includes(q) ||
      (p.company||'').toLowerCase().includes(q) ||
      (p.role||'').toLowerCase().includes(q)
    );
  }
  if (list.length === 0) {
    document.getElementById('contacts-list').innerHTML = '<div class="empty-state">No contacts found</div>';
    return;
  }
  document.getElementById('contacts-list').innerHTML = list.map(p => `
    <div class="contact-row" onclick="openContact('${jsStr(p.key)}')">
      <div class="contact-avatar">${escHtml(initials(p.name))}</div>
      <div class="contact-info">
        <div class="contact-name">${escHtml(p.name)}${p.company?` <span style="color:var(--text-dim);font-size:1.1875rem;font-weight:400">· ${escHtml(p.company)}</span>`:''}</div>
        <div class="contact-detail">${escHtml(p.email)}${p.role?' · '+escHtml(p.role):''} · ${p.deals.length} deal${p.deals.length===1?'':'s'} · Last: ${timeAgo(p.last)}</div>
      </div>
      <div class="contact-actions">
        <a class="contact-btn" href="mailto:${escHtml(p.email)}?subject=Following up - Incremento" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Email
        </a>
        <button class="contact-btn" onclick="event.stopPropagation();openContact('${jsStr(p.key)}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Open
        </button>
      </div>
    </div>`).join('');
}

/* ── Contact card (full person record) ─────────────────────── */
function openContact(key) {
  const p = peopleByKey[key]; if (!p) return;
  const mailto = `mailto:${escHtml(p.email)}?subject=Following up - Incremento`;
  const row = (label, val) => val ? `<div style="display:flex;gap:16px;padding:11px 0;border-bottom:1px solid var(--border)">
      <span style="flex:0 0 120px;color:var(--text-dim);font-size:1.0625rem;letter-spacing:0.04em;text-transform:uppercase">${label}</span>
      <span style="flex:1;color:var(--text);min-width:0;overflow-wrap:anywhere">${val}</span></div>` : '';
  const deals = p.deals.slice().sort((a,b) => new Date(b.submitted_at) - new Date(a.submitted_at));
  const dealSummary = deals.length
    ? deals.map(d => `<div style="margin-bottom:5px"><a href="enquiry.html?id=${d.id}" style="color:var(--cyan);text-decoration:none">${escHtml(d.title)}</a> ${stageBadge(d.stage)}</div>`).join('')
    : '<span style="color:var(--text-dim)">No deal yet</span>';
  const phoneVal = p.phone
    ? `<a href="tel:${escHtml(p.phone)}" style="color:var(--cyan);text-decoration:none">${escHtml(p.phone)}</a>`
    : '<span style="color:var(--text-dim)">Not on file</span>';
  document.getElementById('contact-card-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div class="contact-avatar" style="width:54px;height:54px;font-size:1.4rem;flex:0 0 auto">${escHtml(initials(p.name))}</div>
      <div style="min-width:0">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:1.45rem;font-weight:600;color:var(--text)">${escHtml(p.name)}</div>
        ${p.company?`<div style="color:var(--text-dim);font-size:1.1875rem">${escHtml(p.company)}</div>`:''}
      </div>
    </div>
    ${row('Email', `<a href="${mailto}" style="color:var(--cyan);text-decoration:none">${escHtml(p.email||'-')}</a>`)}
    ${row('Phone', phoneVal)}
    ${row('Role', p.role ? escHtml(p.role) : '')}
    ${row('Last contact', timeAgo(p.last))}
    ${row(deals.length>1?'Deals':'Deal', dealSummary)}
    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
      <a class="btn-ghost" href="${mailto}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Email
      </a>
    </div>`;
  document.getElementById('contact-modal').style.display = 'flex';
}
function closeContact(){ document.getElementById('contact-modal').style.display = 'none'; }

document.getElementById('search-input').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderContacts();
});

loadContacts();
</script>
</body>

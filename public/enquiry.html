<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enquiry — Incremento Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
.editor-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
@media(max-width:1000px){.editor-grid{grid-template-columns:1fr}}
.field-block{margin-bottom:14px}
.field-block input,.field-block select{width:100%;box-sizing:border-box}
.msg-box{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:18px 20px;font-size:0.92rem;line-height:1.7;color:var(--text);white-space:pre-wrap}
.side-meta{font-size:0.78rem;color:var(--text-dim);display:flex;flex-direction:column;gap:7px;margin-top:14px}
.side-meta strong{color:var(--text);font-weight:500}
</style>
</head>
<body>

<!-- ── LOGIN OVERLAY ─────────────────────────────────────── -->
<div id="login-overlay" style="display:none;position:fixed;inset:0;background:rgba(10,18,25,0.97);z-index:999;align-items:center;justify-content:center"></div>

<!-- ── SIDEBAR ────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-brand" style="cursor:pointer" onclick="if(!event.target.closest('.sidebar-brand-link'))location.href='dashboard.html'">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none"><defs><linearGradient id="sg" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#9EF54A"/><stop offset="100%" stop-color="#5EE7D8"/></linearGradient></defs><rect x="4" y="20" width="5" height="8" rx="2.5" fill="url(#sg)" opacity="0.55"/><rect x="12" y="14" width="5" height="14" rx="2.5" fill="url(#sg)" opacity="0.78"/><rect x="20" y="10" width="5" height="18" rx="2.5" fill="url(#sg)"/><circle cx="22.5" cy="5.5" r="2.25" fill="url(#sg)"/></svg>
      <span class="sidebar-brand-name">incremento<span class="dot">.</span></span>
      <a class="sidebar-brand-link" href="https://incremento.co" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item" href="pipeline.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Pipeline</a>
    <a class="nav-item" href="proposals.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Proposals</a>
    <a class="nav-item" href="contacts.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Contacts</a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="brand.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="19" cy="13" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="10" cy="20" r="2.5"/><path d="M11 4.5A8 8 0 104 14"/></svg>Brand</a>
    <a class="nav-item" href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
  </nav>
  <div class="sidebar-footer">
    <a class="nav-item" href="#" onclick="sessionStorage.removeItem('inc_admin_key');localStorage.removeItem('inc_admin_token');location.reload()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sign Out</a>
  </div>
</aside>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<main class="main">
  <div class="page-header">
    <div>
      <div style="margin-bottom:6px"><a href="pipeline.html" style="color:var(--text-dim);font-size:0.78rem;text-decoration:none">&larr; Pipeline</a></div>
      <div class="page-title" id="page-title">Enquiry</div>
      <div class="page-sub" id="page-sub"></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <a id="btn-reply" href="#" class="btn-ghost">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Reply via email
      </a>
      <a id="btn-proposal" href="#" class="btn-ghost">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Create proposal
      </a>
      <button class="btn-primary" id="btn-save" onclick="saveEnquiry()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Save
      </button>
    </div>
  </div>

  <div class="editor-grid" id="content" style="display:none">

    <!-- Left: message + notes -->
    <div>
      <div class="panel" style="padding:24px">
        <div class="detail-label" style="margin-bottom:10px">Message</div>
        <div class="msg-box" id="e-message"></div>
        <div class="detail-label" style="margin:22px 0 8px">Interested in</div>
        <div id="e-interests" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
      <div class="panel" style="padding:24px;margin-top:16px">
        <div class="detail-label" style="margin-bottom:10px">Internal notes</div>
        <textarea class="notes-textarea" id="e-notes" rows="5" placeholder="Notes only you can see…"></textarea>
      </div>
      <div id="comms" style="margin-top:16px"></div>
    </div>

    <!-- Right: contact + pipeline -->
    <div>
      <div class="panel" style="padding:20px">
        <div class="detail-label" style="margin-bottom:12px">Contact</div>
        <div class="side-meta" style="margin-top:0">
          <div>Name <strong id="e-name"></strong></div>
          <div>Email <strong><a id="e-email" href="" style="color:var(--cyan);text-decoration:none"></a></strong></div>
          <div id="e-company-row">Company <strong id="e-company"></strong></div>
          <div>Submitted <strong id="e-submitted"></strong></div>
        </div>
      </div>

      <div class="panel" style="padding:20px;margin-top:16px">
        <div class="detail-label" style="margin-bottom:12px">Pipeline</div>
        <div class="field-block">
          <div class="detail-label" style="font-size:0.66rem">Stage</div>
          <select class="stage-select" id="e-stage" style="width:100%">
            <option value="new">New</option>
            <option value="proposal_sent">Proposal Sent</option>
            <option value="accepted">Accepted</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="on_hold">On Hold</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="field-block" style="margin-bottom:0">
          <div class="detail-label" style="font-size:0.66rem">Est. project value (€)</div>
          <input type="number" class="value-input" id="e-value" placeholder="e.g. 4500">
        </div>
      </div>
    </div>
  </div>
</main>

<script src="admin.js"></script>
<script>
const params = new URLSearchParams(location.search);
const enquiryId = parseInt(params.get('id'));
let enquiry = null;

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function load() {
  if (!enquiryId) { document.getElementById('page-sub').textContent = 'No enquiry selected'; return; }
  try {
    enquiry = await apiFetch('/api/enquiries/' + enquiryId);
    if (enquiry.error) throw new Error(enquiry.error);
  } catch (e) {
    document.getElementById('page-sub').textContent = 'Failed to load enquiry';
    return;
  }

  document.getElementById('page-title').textContent = enquiry.name + (enquiry.company ? ' — ' + enquiry.company : '');
  document.getElementById('page-sub').textContent = enquiry.email;

  document.getElementById('e-message').textContent = enquiry.message || '';
  document.getElementById('e-name').textContent = enquiry.name || '—';
  const em = document.getElementById('e-email');
  em.textContent = enquiry.email;
  em.href = `mailto:${enquiry.email}?subject=Re: Your enquiry to Incremento`;
  document.getElementById('e-company').textContent = enquiry.company || '—';
  document.getElementById('e-submitted').textContent = new Date(enquiry.submitted_at).toLocaleString('en-GB');

  const ints = document.getElementById('e-interests');
  try {
    const arr = typeof enquiry.interests==='string' ? JSON.parse(enquiry.interests||'[]') : (enquiry.interests||[]);
    ints.innerHTML = arr.length ? arr.map(i=>`<span class="interest-pill">${escHtml(i.replace(/-/g,' '))}</span>`).join('') : '<span style="color:var(--text-dim);font-size:0.8rem">—</span>';
  } catch { ints.textContent = '—'; }

  document.getElementById('e-stage').value = enquiry.stage || 'new';
  document.getElementById('e-value').value = enquiry.value || '';
  document.getElementById('e-notes').value = enquiry.notes || '';

  document.getElementById('btn-reply').href = `mailto:${enquiry.email}?subject=Re: Your enquiry to Incremento`;
  document.getElementById('btn-proposal').href = `proposal.html?enquiry=${enquiry.id}`;

  document.getElementById('content').style.display = 'grid';

  mountComms(document.getElementById('comms'), {
    email: enquiry.email,
    enquiry_id: enquiry.id,
  });
}

async function saveEnquiry() {
  const btn = document.getElementById('btn-save');
  const orig = btn.innerHTML;
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await apiFetch('/api/enquiries/' + enquiryId, {
      method: 'PATCH',
      body: JSON.stringify({
        stage: document.getElementById('e-stage').value,
        value: parseInt(document.getElementById('e-value').value) || 0,
        notes: document.getElementById('e-notes').value,
      })
    });
    btn.innerHTML = '✓ Saved';
    setTimeout(()=>{ btn.innerHTML = orig; btn.disabled = false; }, 1500);
  } catch {
    btn.textContent = 'Error — retry';
    btn.disabled = false;
  }
}

load();
</script>
</body>
</html>

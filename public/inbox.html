    <p style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:6px">incremento<span style="color:var(--lime)">.</span> admin</p>

    <button id="login-btn" class="btn-primary" style="width:100%;justify-content:center">Unlock</button>
  </div>
</div>

<!-- ── SIDEBAR ────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-brand" style="cursor:pointer" onclick="if(!event.target.closest('.sidebar-brand-link'))location.href='dashboard.html'">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none"><defs><linearGradient id="sg" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#9EF54A"/><stop offset="100%" stop-color="#5EE7D8"/></linearGradient></defs><rect x="4" y="20" width="5" height="8" rx="2.5" fill="url(#sg)" opacity="0.55"/><rect x="12" y="14" width="5" height="14" rx="2.5" fill="url(#sg)" opacity="0.78"/><rect x="20" y="10" width="5" height="18" rx="2.5" fill="url(#sg)"/><circle cx="22.5" cy="5.5" r="2.25" fill="url(#sg)"/></svg>
      <span class="sidebar-brand-name">incremento<span class="dot">.</span></span>
      <a class="sidebar-brand-link" href="https://incremento.co" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="pipeline.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Pipeline</a>
    <a class="nav-item" href="proposals.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Proposals</a>
    <a class="nav-item" href="contacts.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Contacts</a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="brand.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="19" cy="13" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="10" cy="20" r="2.5"/><path d="M11 4.5A8 8 0 104 14"/></svg>Brand</a>
    <a class="nav-item" href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Inbox</div>
      <div class="page-sub" id="inbox-count"></div>
    </div>
  </div>

  <div class="topbar-row">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search by name, email, company…">
    </div>
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-stage="">All</button>
      <button class="filter-tab" data-stage="new">New</button>
      <button class="filter-tab" data-stage="proposal_sent">Proposal Sent</button>
      <button class="filter-tab" data-stage="accepted">Accepted</button>
      <button class="filter-tab" data-stage="in_progress">In Progress</button>
      <button class="filter-tab" data-stage="completed">Completed</button>
      <button class="filter-tab" data-stage="cancelled">Cancelled</button>
    </div>
  </div>

  <div class="panel">
    <div id="inbox-list">
      <div class="empty-state">Loading…</div>
    </div>
  </div>
</main>

<script src="admin.js"></script>
<script>
let allEnquiries = [];
let currentId    = null;
let activeStage  = '';
let searchTerm   = '';

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadInbox() {
  try {
    const data = await apiFetch('/api/enquiries?limit=200');
    allEnquiries = data.enquiries || [];
    renderList();
  } catch {
    document.getElementById('inbox-list').innerHTML = '<div class="empty-state">Failed to load enquiries</div>';
  }
}

function renderList() {
  let list = allEnquiries;
  if (activeStage)  list = list.filter(e => e.stage === activeStage);
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    list = list.filter(e =>
      (e.name||'').toLowerCase().includes(q) ||
      (e.email||'').toLowerCase().includes(q) ||
      (e.company||'').toLowerCase().includes(q)
    );
  }

  document.getElementById('inbox-count').textContent = list.length + ' enquir' + (list.length===1?'y':'ies');

  if (list.length === 0) {
    document.getElementById('inbox-list').innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>No enquiries found</div>';
    return;
  }

  document.getElementById('inbox-list').innerHTML = list.map(e => `
    <div class="inbox-row${e.stage==='new'?' unread':''}" onclick="location.href='enquiry.html?id='+${e.id}">
      <div class="inbox-row-header">
        <span class="inbox-row-name">${escHtml(e.name)}${e.company?` <span style="color:var(--text-dim);font-weight:400">· ${escHtml(e.company)}</span>`:''}</span>
        <span class="inbox-row-time">${timeAgo(e.submitted_at)}</span>
      </div>
      <div class="inbox-row-sub">
        ${stageBadge(e.stage)}
        ${interestPills(e.interests)}
        ${e.value>0?`<span style="font-size:0.7rem;color:var(--green)">€${Number(e.value).toLocaleString()}</span>`:''}
      </div>
      <div class="inbox-row-body">${escHtml(e.message)}</div>
    </div>`).join('');
}

// Filter tabs
document.getElementById('filter-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeStage = tab.dataset.stage;
  renderList();
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderList();
});

// Deep links: redirect old ?id= URLs to the enquiry page
const urlId = new URLSearchParams(location.search).get('id');
if (urlId) location.replace('enquiry.html?id=' + urlId);

loadInbox();
</script>
</body>
</html>

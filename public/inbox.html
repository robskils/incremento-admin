<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox — Incremento Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<!-- ── LOGIN OVERLAY ─────────────────────────────────────── -->
<div id="login-overlay" style="display:none;position:fixed;inset:0;background:rgba(10,18,25,0.97);z-index:999;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center">
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none" style="margin:0 auto 16px"><defs><linearGradient id="lg" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#9EF54A"/><stop offset="100%" stop-color="#5EE7D8"/></linearGradient></defs><rect x="4" y="20" width="5" height="8" rx="2.5" fill="url(#lg)" opacity="0.55"/><rect x="12" y="14" width="5" height="14" rx="2.5" fill="url(#lg)" opacity="0.78"/><rect x="20" y="10" width="5" height="18" rx="2.5" fill="url(#lg)"/><circle cx="22.5" cy="5.5" r="2.25" fill="url(#lg)"/></svg>
    <p style="font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:6px">incremento<span style="color:var(--lime)">.</span> admin</p>
    <p style="font-size:0.78rem;color:var(--text-dim);margin-bottom:24px">Enter your admin key to continue</p>
    <input id="login-key" type="password" placeholder="Admin key" style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;font-family:'Inter',sans-serif;font-size:0.88rem;color:var(--text);outline:none;margin-bottom:12px">
    <button id="login-btn" class="btn-primary" style="width:100%;justify-content:center">Unlock</button>
  </div>
</div>

<!-- ── SIDEBAR ────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-brand">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none"><defs><linearGradient id="sg" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#9EF54A"/><stop offset="100%" stop-color="#5EE7D8"/></linearGradient></defs><rect x="4" y="20" width="5" height="8" rx="2.5" fill="url(#sg)" opacity="0.55"/><rect x="12" y="14" width="5" height="14" rx="2.5" fill="url(#sg)" opacity="0.78"/><rect x="20" y="10" width="5" height="18" rx="2.5" fill="url(#sg)"/><circle cx="22.5" cy="5.5" r="2.25" fill="url(#sg)"/></svg>
      <span class="sidebar-brand-name">incremento<span class="dot">.</span></span>
      <a class="sidebar-brand-link" href="https://incremento.co" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item active" href="inbox.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Inbox<span class="nav-badge" id="nav-badge" style="display:none"></span></a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="pipeline.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Pipeline</a>
    <a class="nav-item" href="contacts.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Contacts</a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="analytics.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Analytics</a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
  </nav>
  <div class="sidebar-footer">
    <a class="nav-item" href="#" onclick="sessionStorage.removeItem('inc_admin_key');location.reload()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sign Out</a>
  </div>
</aside>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Inbox</div>
      <div class="page-sub" id="inbox-count"></div>
    </div>
  </div>

  <div class="topbar-row">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search by name, email, company…">
    </div>
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-stage="">All</button>
      <button class="filter-tab" data-stage="new">New</button>
      <button class="filter-tab" data-stage="qualifying">Qualifying</button>
      <button class="filter-tab" data-stage="proposal_sent">Proposal Sent</button>
      <button class="filter-tab" data-stage="accepted">Accepted</button>
      <button class="filter-tab" data-stage="in_progress">In Progress</button>
      <button class="filter-tab" data-stage="completed">Completed</button>
      <button class="filter-tab" data-stage="cancelled">Cancelled</button>
    </div>
  </div>

  <div class="panel">
    <div id="inbox-list">
      <div class="empty-state">Loading…</div>
    </div>
  </div>
</main>

<!-- ── ENQUIRY DETAIL MODAL ────────────────────────────────── -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-name"></div>
        <div style="font-size:0.75rem;color:var(--text-dim);margin-top:3px" id="modal-meta"></div>
      </div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="detail-field">
          <div class="detail-label">Email</div>
          <div class="detail-value"><a id="modal-email" href="" style="color:var(--cyan)"></a></div>
        </div>
        <div class="detail-field" id="modal-company-wrap">
          <div class="detail-label">Company</div>
          <div class="detail-value" id="modal-company"></div>
        </div>
      </div>
      <div class="detail-field" id="modal-interests-wrap" style="margin-bottom:16px">
        <div class="detail-label">Interested in</div>
        <div class="detail-value" id="modal-interests"></div>
      </div>
      <div class="detail-field" style="margin-bottom:20px">
        <div class="detail-label">Message</div>
        <div class="detail-message" id="modal-message"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="detail-field">
          <div class="detail-label">Stage</div>
          <select class="stage-select" id="modal-stage">
            <option value="new">New</option>
            <option value="qualifying">Qualifying</option>
            <option value="proposal_sent">Proposal Sent</option>
            <option value="accepted">Accepted</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="on_hold">On Hold</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="detail-field">
          <div class="detail-label">Est. Project Value (€)</div>
          <input type="number" class="value-input" id="modal-value" placeholder="e.g. 4500" style="width:100%">
        </div>
      </div>
      <div class="detail-field">
        <div class="detail-label">Notes</div>
        <textarea class="notes-textarea" id="modal-notes" placeholder="Internal notes…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <a id="modal-reply" href="" class="btn-ghost">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Reply via email
      </a>
      <button class="btn-primary" id="modal-save" onclick="saveEnquiry()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Save
      </button>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
let allEnquiries = [];
let currentId    = null;
let activeStage  = '';
let searchTerm   = '';

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadInbox() {
  try {
    const data = await apiFetch('/api/enquiries?limit=200');
    allEnquiries = data.enquiries || [];
    renderList();
  } catch {
    document.getElementById('inbox-list').innerHTML = '<div class="empty-state">Failed to load enquiries</div>';
  }
}

function renderList() {
  let list = allEnquiries;
  if (activeStage)  list = list.filter(e => e.stage === activeStage);
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    list = list.filter(e =>
      (e.name||'').toLowerCase().includes(q) ||
      (e.email||'').toLowerCase().includes(q) ||
      (e.company||'').toLowerCase().includes(q)
    );
  }

  document.getElementById('inbox-count').textContent = list.length + ' enquir' + (list.length===1?'y':'ies');

  if (list.length === 0) {
    document.getElementById('inbox-list').innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>No enquiries found</div>';
    return;
  }

  document.getElementById('inbox-list').innerHTML = list.map(e => `
    <div class="inbox-row${e.stage==='new'?' unread':''}" onclick="openModal(${e.id})">
      <div class="inbox-row-header">
        <span class="inbox-row-name">${escHtml(e.name)}${e.company?` <span style="color:var(--text-dim);font-weight:400">· ${escHtml(e.company)}</span>`:''}</span>
        <span class="inbox-row-time">${timeAgo(e.submitted_at)}</span>
      </div>
      <div class="inbox-row-sub">
        ${stageBadge(e.stage)}
        ${interestPills(e.interests)}
        ${e.value>0?`<span style="font-size:0.7rem;color:var(--green)">€${Number(e.value).toLocaleString()}</span>`:''}
      </div>
      <div class="inbox-row-body">${escHtml(e.message)}</div>
    </div>`).join('');
}

// Filter tabs
document.getElementById('filter-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeStage = tab.dataset.stage;
  renderList();
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderList();
});

// Check URL for pre-selected id
const urlId = new URLSearchParams(location.search).get('id');

function openModal(id) {
  const e = allEnquiries.find(x => x.id === id);
  if (!e) return;
  currentId = id;

  document.getElementById('modal-name').textContent = e.name + (e.company ? ` — ${e.company}` : '');
  document.getElementById('modal-meta').textContent = e.email + ' · ' + new Date(e.submitted_at).toLocaleString('en-GB');
  const emailEl = document.getElementById('modal-email');
  emailEl.href = `mailto:${e.email}?subject=Re: Your enquiry to Incremento`;
  emailEl.textContent = e.email;
  document.getElementById('modal-reply').href = `mailto:${e.email}?subject=Re: Your enquiry to Incremento`;

  const comp = document.getElementById('modal-company');
  comp.textContent = e.company || '—';

  const ints = document.getElementById('modal-interests');
  if (e.interests) {
    try {
      const arr = typeof e.interests==='string' ? JSON.parse(e.interests) : e.interests;
      ints.innerHTML = arr.map(i=>`<span class="interest-pill" style="margin-right:4px">${i.replace(/-/g,' ')}</span>`).join('');
    } catch { ints.textContent = e.interests; }
  } else { ints.textContent = '—'; }

  document.getElementById('modal-message').textContent = e.message;
  document.getElementById('modal-stage').value = e.stage || 'new';
  document.getElementById('modal-value').value = e.value || '';
  document.getElementById('modal-notes').value = e.notes || '';

  document.getElementById('modal').style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').style.display = 'none';
  currentId = null;
  history.replaceState(null,'','inbox.html');
}

async function saveEnquiry() {
  if (!currentId) return;
  const btn = document.getElementById('modal-save');
  btn.textContent = 'Saving…';
  btn.disabled = true;
  try {
    await apiFetch('/api/enquiries/' + currentId, {
      method: 'PATCH',
      body: JSON.stringify({
        stage: document.getElementById('modal-stage').value,
        value: parseInt(document.getElementById('modal-value').value) || 0,
        notes: document.getElementById('modal-notes').value,
      })
    });
    const e = allEnquiries.find(x => x.id === currentId);
    if (e) {
      e.stage = document.getElementById('modal-stage').value;
      e.value = parseInt(document.getElementById('modal-value').value) || 0;
      e.notes = document.getElementById('modal-notes').value;
    }
    renderList();
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Saved!';
    setTimeout(()=>{ btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Save'; btn.disabled=false; }, 1500);
  } catch {
    btn.textContent = 'Error — retry';
    btn.disabled = false;
  }
}

loadInbox().then(()=>{ if (urlId) openModal(parseInt(urlId)); });
</script>
</body>
</html>

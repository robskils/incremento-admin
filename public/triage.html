<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triage — Incremento Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
.tr-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:20px 22px;margin-bottom:16px;transition:opacity .25s,transform .25s}
.tr-card.going{opacity:0;transform:translateY(-6px)}
.tr-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
.tr-name{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:600;color:var(--text)}
.tr-co{color:var(--text-dim);font-weight:400}
.tr-time{font-size:1.0625rem;color:var(--text-dim);white-space:nowrap}
.tr-email{font-size:1.1875rem;color:var(--text-sub);margin-top:3px;overflow-wrap:anywhere}
.tr-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tr-msg{font-size:1.1875rem;color:var(--text-sub);line-height:1.55;white-space:pre-wrap;margin-top:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.tr-suggest{display:flex;align-items:center;gap:9px;margin-top:14px;padding:11px 14px;border-radius:10px;background:rgba(94,231,216,0.09);border:1px solid rgba(94,231,216,0.32);font-size:1.1875rem;color:var(--text-sub)}
.tr-suggest .s-strong{color:var(--cyan);font-weight:600}
.tr-suggest .s-tag{font-size:1.0625rem;color:var(--text-dim);border:1px solid var(--border2);border-radius:20px;padding:1px 9px;margin-left:auto;white-space:nowrap}
.tr-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.tr-btn{font-size:1.1875rem;font-weight:500;padding:9px 16px;border-radius:9px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:7px}
.tr-btn:hover{border-color:var(--cyan)}
.tr-btn.primary{background:linear-gradient(135deg,#9EF54A,#5EE7D8);color:#0a1219;border-color:#9EF54A;font-weight:600}
.tr-btn.primary:hover{filter:brightness(1.05)}
.tr-btn.danger:hover{border-color:#ef4444;color:#ff8a8a}
.tr-btn:disabled{opacity:.5;cursor:default}
.tr-empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
.tr-empty svg{width:46px;height:46px;opacity:.4;margin-bottom:14px}
</style>
</head>
<body>

<div id="login-overlay" style="display:none;position:fixed;inset:0;background:rgba(10,18,25,0.97);z-index:999;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center">
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none" style="margin:0 auto 16px"><defs><linearGradient id="lg" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#9EF54A"/><stop offset="100%" stop-color="#5EE7D8"/></linearGradient></defs><rect x="4" y="20" width="5" height="8" rx="2.5" fill="url(#lg)" opacity="0.55"/><rect x="12" y="14" width="5" height="14" rx="2.5" fill="url(#lg)" opacity="0.78"/><rect x="20" y="10" width="5" height="18" rx="2.5" fill="url(#lg)"/><circle cx="22.5" cy="5.5" r="2.25" fill="url(#lg)"/></svg>
    <p style="font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:600;color:var(--text);margin-bottom:6px">incremento<span style="color:var(--lime)">.</span> admin</p>
    <p style="font-size:1.1875rem;color:var(--text-dim);margin-bottom:24px">Enter your admin key to continue</p>
    <input id="login-key" type="password" placeholder="Admin key" style="width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;font-family:'Inter',sans-serif;font-size:1.1875rem;color:var(--text);outline:none;margin-bottom:12px">
    <button id="login-btn" class="btn-primary" style="width:100%;justify-content:center">Unlock</button>
  </div>
</div>

  <div class="sidebar-top">
    <div class="sidebar-brand" style="cursor:pointer" onclick="if(!event.target.closest('.sidebar-brand-link'))location.href='dashboard.html'">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none"><defs><linearGradient id="sg" x1="0" y1="32" x2="32" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#9EF54A"/><stop offset="100%" stop-color="#5EE7D8"/></linearGradient></defs><rect x="4" y="20" width="5" height="8" rx="2.5" fill="url(#sg)" opacity="0.55"/><rect x="12" y="14" width="5" height="14" rx="2.5" fill="url(#sg)" opacity="0.78"/><rect x="20" y="10" width="5" height="18" rx="2.5" fill="url(#sg)"/><circle cx="22.5" cy="5.5" r="2.25" fill="url(#sg)"/></svg>
      <span class="sidebar-brand-name">incremento<span class="dot">.</span></span>
      <a class="sidebar-brand-link" href="https://incremento.co" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item active" href="triage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>Triage<span class="nav-badge" id="triage-badge" style="display:none"></span></a>
    <a class="nav-item" href="pipeline.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Pipeline</a>

    <a class="nav-item" href="contacts.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Contacts</a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="brand.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="19" cy="13" r="2.5"/><circle cx="6" cy="12" r="2.5"/><circle cx="10" cy="20" r="2.5"/><path d="M11 4.5A8 8 0 104 14"/></svg>Brand</a>
    <a class="nav-item" href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
  </nav>
  <div class="sidebar-footer">
    <a class="nav-item" href="#" onclick="sessionStorage.removeItem('inc_admin_key');localStorage.removeItem('inc_admin_token');location.reload()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sign Out</a>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Triage</div>
      <div class="page-sub" id="tr-sub">New form submissions waiting to be sorted</div>
    </div>
  </div>

  <div id="tr-list"><div class="empty-state">Loading…</div></div>
</main>

<script src="admin.js"></script>
<script>
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function jsStr(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
const MATCH_LABEL = { email:'same email', company:'same company', domain:'same email domain' };

let items = [];

async function loadTriage() {
  try {
    const data = await apiFetch('/api/triage');
    items = data.items || [];
    render();
  } catch {
    document.getElementById('tr-list').innerHTML = '<div class="empty-state">Failed to load triage queue</div>';
  }
}

function render() {
  const sub = document.getElementById('tr-sub');
  sub.textContent = items.length
    ? `${items.length} submission${items.length===1?'':'s'} waiting to be sorted`
    : 'Nothing to triage — you are all caught up';
  const badge = document.getElementById('triage-badge');
  if (badge) { if (items.length){badge.textContent=items.length;badge.style.display='inline';} else badge.style.display='none'; }

  if (!items.length) {
    document.getElementById('tr-list').innerHTML = `
      <div class="tr-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <div style="font-size:1.3rem;color:var(--text-sub);font-weight:500">Inbox zero</div>
        <div style="margin-top:6px">No new submissions to sort right now.</div>
      </div>`;
    return;
  }

  document.getElementById('tr-list').innerHTML = items.map(it => {
    const m = it.match;
    const suggest = m ? `
      <div class="tr-suggest">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 00-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0012 2z"/></svg>
        <span>Looks like an existing deal: <span class="s-strong">${escHtml(m.label)}</span></span>
        <span class="s-tag">${MATCH_LABEL[m.type]||'possible match'}</span>
      </div>` : '';
    const actions = m ? `
      <button class="tr-btn primary" onclick="doMerge(${it.id}, ${m.enquiry_id}, this)">Add to ${escHtml(m.label)}</button>
      <button class="tr-btn" onclick="doAccept(${it.id}, this)">New deal instead</button>
      <button class="tr-btn danger" onclick="doDismiss(${it.id}, this)">Not a deal</button>
    ` : `
      <button class="tr-btn primary" onclick="doAccept(${it.id}, this)">Create deal</button>
      <button class="tr-btn danger" onclick="doDismiss(${it.id}, this)">Not a deal</button>
    `;
    const co = it.company ? ` <span class="tr-co">· ${escHtml(it.company)}</span>` : '';
    let tags = '';
    try { tags = interestPills(it.interests); } catch {}
    return `
      <div class="tr-card" id="tr-${it.id}">
        <div class="tr-top">
          <div class="tr-name">${escHtml(it.name)}${co}</div>
          <div class="tr-time">${timeAgo(it.submitted_at)}</div>
        </div>
        <div class="tr-email">${escHtml(it.email)}</div>
        ${tags ? `<div class="tr-tags">${tags}</div>` : ''}
        <div class="tr-msg">${escHtml(it.message)}</div>
        ${suggest}
        <div class="tr-actions">${actions}</div>
      </div>`;
  }).join('');
}

function removeCard(id) {
  const el = document.getElementById('tr-' + id);
  if (el) el.classList.add('going');
  items = items.filter(x => x.id !== id);
  setTimeout(() => { render(); }, 250);
}
function busy(btn){ const row = btn.closest('.tr-actions'); if(row) row.querySelectorAll('button').forEach(b=>b.disabled=true); }

async function doAccept(id, btn) {
  busy(btn);
  try { await apiFetch('/api/triage/' + id + '/accept', { method:'POST' }); removeCard(id); }
  catch { alert('Could not create the deal. Please try again.'); render(); }
}
async function doMerge(id, target, btn) {
  busy(btn);
  try { await apiFetch('/api/triage/' + id + '/merge', { method:'POST', body: JSON.stringify({ target_enquiry_id: target }) }); removeCard(id); }
  catch { alert('Could not add to the deal. Please try again.'); render(); }
}
async function doDismiss(id, btn) {
  if (!confirm('Dismiss this as not a deal? It will be archived and removed from the queue.')) return;
  busy(btn);
  try { await apiFetch('/api/triage/' + id + '/dismiss', { method:'POST' }); removeCard(id); }
  catch { alert('Could not dismiss. Please try again.'); render(); }
}

loadTriage();
</script>
</body>
</html>
